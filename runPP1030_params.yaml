brown_box_description: "<?xml version=\"1.0\"?>\n<!-- Brown place-target box. Matches\
  \ the low ManiSkill PickPlace shelf:\n     half-sizes (0.08, 0.08, 0.005) -> full\
  \ (0.16, 0.16, 0.01). Static:\n     it never moves, the cube is placed on its top\
  \ face. base_link is at the box\n     CENTER, so spawn it at world (0.515, -0.35,\
  \ 0.755) -> top face at z = 0.76. -->\n<robot name=\"brown_box\">\n  <link name=\"\
  base_link\">\n    <visual>\n      <geometry>\n        <box size=\"0.16 0.16 0.01\"\
  />\n      </geometry>\n      <material name=\"brown\">\n        <color rgba=\"0.22\
  \ 0.11 0.04 1\"/>\n      </material>\n    </visual>\n\n    <collision>\n      <geometry>\n\
  \        <box size=\"0.16 0.16 0.01\"/>\n      </geometry>\n    </collision>\n\n\
  \    <inertial>\n      <mass value=\"5.0\"/>\n      <inertia ixx=\"0.02\" ixy=\"\
  0.0\" ixz=\"0.0\" iyy=\"0.02\" iyz=\"0.0\" izz=\"0.02\"/>\n    </inertial>\n  </link>\n\
  \n  <gazebo>\n    <static>true</static>\n  </gazebo>\n</robot>\n"
