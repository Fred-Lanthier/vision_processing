# Position-PID -> effort gains for the DefaultRobotHWSim position interface of
# the xArm7 arm joints. Loaded by pickplace_simulation_xarm.launch ONLY when
# arm_effort_mode:=true (the default).
#
# EFFORT mode (this file loaded): the arm is effort-driven and physically
# collides with static environment geometry. p/d are the MANUFACTURER-validated
# Gazebo gains from xarm_ros (xarm_controller/config/xarm7/xarm7_controllers.yaml,
# joint*_position_controller), tuned for these link inertias with gravity ENABLED.
# DefaultRobotHWSim has no gravity compensation, so the i-term supplies the steady
# gravity torque; i_clamp is raised above the manufacturer's tiny values so the
# integral can reach the max static gravity torque (~40 Nm at joint 2). Effort is
# clamped to the URDF joint limits (raised sim-only to 300 Nm in the xacro).
#
# KINEMATIC mode (arm_effort_mode:=false -> this file NOT loaded): with no
# pid_gains, DefaultRobotHWSim uses SetPosition tracking — perfectly stiff, no
# tuning, but the arm passes through static geometry (no contact). Known-good
# baseline for the motion/planner; use it to A/B against effort mode.
gazebo_ros_control:
  pid_gains:
    xarm7_joint1: {p: 1200.0, i: 5.0,  d: 10.0, i_clamp: 100.0}
    xarm7_joint2: {p: 1400.0, i: 5.0,  d: 10.0, i_clamp: 100.0}
    xarm7_joint3: {p: 1200.0, i: 5.0,  d: 5.0,  i_clamp: 100.0}
    xarm7_joint4: {p: 850.0,  i: 3.0,  d: 5.0,  i_clamp: 100.0}
    xarm7_joint5: {p: 500.0,  i: 3.0,  d: 1.0,  i_clamp: 50.0}
    xarm7_joint6: {p: 500.0,  i: 1.0,  d: 1.0,  i_clamp: 50.0}
    xarm7_joint7: {p: 300.0,  i: 0.05, d: 1.0,  i_clamp: 30.0}
